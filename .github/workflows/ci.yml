
name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore
        run: dotnet restore /backend/src/todoApp.Web
      
      - name: Build
        run: dotnet build --no-restore /backend/src/todoApp.Web
      
      - name: Test
        run: dotnet test --no-build --verbosity normal 
/backend/src/todoApp.Web
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
