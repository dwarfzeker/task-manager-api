
name: Release

on:
  push:
    tags:
      - 'v*' 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore /backend/src/todoApp.Web
      
      - name: Build
        run: dotnet build --no-restore --configuration Release 
/backend/src/todoApp.Web
      
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
  
  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Publish
        run: dotnet publish todoApp.Web/todoApp.Web.csproj -c Release -o publish
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoapp-release
          path: publish/
  
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/todoapp:latest
            ghcr.io/${{ github.repository_owner }}/todoapp:${{ github.ref_name }}
  
  create-release:
    needs: [publish, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: todoapp-release
          path: publish/
      
      - name: Create ZIP
        run: |
          cd publish
          zip -r ../todoapp-${{ github.ref_name }}.zip .
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            todoapp-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
